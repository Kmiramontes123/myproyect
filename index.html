<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>KM Makeup</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="header">
  <div class="header-container">
    <div class="logo">
      <img src="" alt="Logo">
    </div>

    <nav>
      <a href="#">Inicio</a>
      <a href="#cursos">Cursos</a>
      <a href="#reserva">Reservar</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Profesionalízate en maquillaje</h1>
    <p>Aprende con expertos y convierte tu talento en negocio</p>
    <a href="#cursos" class="btn">Ver cursos</a>
  </div>
</section>

<!-- CURSOS -->
<section id="cursos" class="cursos">
  <h2>Nuestros Cursos</h2>
<div class="cards" id="contenedor-cursos"></div>
</section>

<!-- GALERÍA -->
<section class="galeria">
  <h2>Galería</h2>
  <div id="contenedor-imagenes"></div>
</section>

<!-- RESERVA -->
<section id="reserva" class="reserva">
  <div class="reserva-box">
    <h2>Reserva tu curso</h2>

    <select id="curso">
      <option>Maquillaje Profesional</option>
      <option>Uñas</option>
      <option>Belleza Online</option>
    </select>

    <input type="text" id="fecha" placeholder="Fecha">

    <button onclick="reservar()">Reservar</button>
  </div>
</section>

<a href="https://wa.me/521XXXXXXXXXX" class="whatsapp" target="_blank">
  <i class="fab fa-whatsapp"></i>
  <span>WhatsApp</span>
</a>

<a href="https://instagram.com/TU_USUARIO" class="instagram" target="_blank">
  <i class="fab fa-instagram"></i>
  <span>Instagram</span>
</a>
<section class="contador">
  <div class="contador-box">
    <h2 id="contadorNumero">100</h2>
    <p>Alumnas capacitadas</p>
  </div>
</section>

<script src="script.js"></script>
<!-- MODAL IMAGEN -->
<div id="modal" class="modal">
  <span id="cerrar">&times;</span>
  <img id="modal-img">
</div>
</body>
</html>
